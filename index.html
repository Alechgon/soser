<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOSER · Agregar Caso</title>
<style>
:root{
  --carbon:#333333;--carbon-2:#2A2A2A;--ink:#2A2A2A;
  --orange:#F49A0F;--orange-d:#DE7C08;--green:#7DB61C;--green-d:#5E8E13;--leaf:#2E7D32;
  --paper:#F4F5F3;--card:#FFFFFF;--line:#E4E4DF;--muted:#8C8C86;--red:#CE4257;
  --shadow:0 10px 30px rgba(51,51,51,.10);--shadow-sm:0 4px 14px rgba(51,51,51,.08);
  --grad:linear-gradient(120deg,var(--orange),var(--green));
  --grad-soft:linear-gradient(135deg,rgba(244,154,15,.12),rgba(125,182,28,.12));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.45;font-size:16px;overscroll-behavior-y:none;}
.hidden{display:none!important;}
.app{max-width:820px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

.topbar{position:sticky;top:0;z-index:40;background:var(--carbon);color:#fff;display:flex;align-items:center;gap:13px;padding:14px 18px;box-shadow:0 2px 16px rgba(0,0,0,.20);}
.logo{width:42px;height:42px;flex:0 0 auto;border-radius:12px;background:#fff;padding:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.18);}
.logo svg{width:100%;height:100%;}
.brand{display:flex;flex-direction:column;line-height:1.06;}
.brand b{font-size:19px;letter-spacing:2.5px;font-weight:800;}
.brand span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.topbar .right{margin-left:auto;display:flex;gap:9px;align-items:center;}
.gpschip{display:flex;align-items:center;gap:6px;font-size:11px;color:#d0d0cb;background:rgba(255,255,255,.09);padding:6px 11px;border-radius:22px;font-weight:700;}
.gpschip .dot{width:7px;height:7px;border-radius:50%;background:#8a8a8a;}
.gpschip .dot.ok{background:var(--green);box-shadow:0 0 0 3px rgba(125,182,28,.25);}
.gpschip .dot.wait{background:var(--orange);animation:pulse 1.2s infinite;}
@keyframes pulse{50%{opacity:.4;}}
.iconbtn{background:rgba(255,255,255,.10);border:none;color:#fff;width:42px;height:42px;border-radius:11px;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.iconbtn:active{background:rgba(255,255,255,.22);}

.content{flex:1;padding:18px 18px 108px;display:flex;flex-direction:column;min-height:0;}
.screen{animation:fade .28s cubic-bezier(.2,.7,.3,1);flex:1;display:flex;flex-direction:column;min-height:0;}
.screen>.fill{flex:1;display:flex;flex-direction:column;min-height:0;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* HOME */
.hero{text-align:center;padding:34px 12px 8px;}
.hero .mark{width:104px;height:104px;border-radius:28px;margin:0 auto 20px;background:#fff;display:flex;align-items:center;justify-content:center;padding:16px;box-shadow:0 16px 40px rgba(244,154,15,.20),0 6px 16px rgba(125,182,28,.16);}
.hero .mark svg{width:100%;height:100%;}
.hero h1{margin:8px 0 3px;font-size:26px;letter-spacing:.2px;color:var(--carbon);font-weight:800;}
.hero p{margin:0;color:var(--muted);font-size:14px;}
.home-actions{display:grid;gap:14px;margin-top:30px;}
.primary-action{background:var(--carbon);color:#fff;border:none;border-radius:20px;padding:26px 22px;display:flex;align-items:center;gap:18px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;text-align:left;font-family:inherit;}
.primary-action:active{transform:scale(.98);}
.primary-action .pa-ic{width:58px;height:58px;border-radius:16px;flex:0 0 auto;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:28px;}
.primary-action h3{margin:0 0 3px;font-size:19px;font-weight:800;}
.primary-action p{margin:0;font-size:13px;color:#c9c9c4;font-weight:500;}
.primary-action .pa-arrow{margin-left:auto;font-size:26px;color:#fff;opacity:.7;}
.mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mini{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 16px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s;text-align:center;}
.mini:active{transform:scale(.97);}
.mini .m-ic{width:48px;height:48px;border-radius:13px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:23px;background:var(--grad-soft);}
.mini b{display:block;font-size:14px;color:var(--carbon);}
.mini small{color:var(--muted);font-size:12px;}
.cfg-warn{background:rgba(244,154,15,.10);border:1px solid rgba(244,154,15,.4);color:#9a6207;border-radius:14px;padding:12px 14px;font-size:13px;margin-top:20px;text-align:center;line-height:1.4;}

/* CARD/FORM */
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:var(--shadow-sm);margin-bottom:16px;}
.eyebrow{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:7px;}
.eyebrow b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.eyebrow .grp{color:var(--muted);font-weight:700;}
h2.q{font-size:22px;margin:2px 0 18px;line-height:1.3;color:var(--carbon);font-weight:800;}
label.fld{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=number],input[type=tel],input[type=url],textarea,select{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,154,15,.15);}
textarea{min-height:110px;resize:vertical;}
.field-block{margin-bottom:18px;}

/* SEARCH */
.search-wrap{position:relative;}
.search-wrap input{padding:16px 44px 16px 48px;border-radius:15px;font-weight:500;}
.search-wrap .ic-lead{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:19px;color:var(--muted);pointer-events:none;}
.suggest{position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:30;background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:0 18px 42px rgba(51,51,51,.18);max-height:310px;overflow-y:auto;}
.suggest div{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--paper);font-size:15px;font-weight:600;color:var(--carbon);display:flex;gap:11px;align-items:center;}
.suggest div::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--grad);flex:0 0 auto;}
.suggest div small{display:block;color:var(--muted);font-size:12px;font-weight:500;margin-top:2px;}
.suggest div:active,.suggest div.hl{background:var(--paper);}
.clearbtn{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:var(--paper);border:none;border-radius:10px;width:33px;height:33px;font-size:15px;cursor:pointer;color:var(--muted);}
.divider-or{display:flex;align-items:center;gap:12px;margin:8px 0 16px;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:1px;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--line);}
.readonly-grid{display:grid;gap:11px;grid-template-columns:1fr 1fr;}
.readonly-grid .ro.full{grid-column:1/-1;}
.ro{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 14px;}
.ro span{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:800;}
.ro b{font-size:14.5px;font-weight:700;word-break:break-word;color:var(--carbon);}
.ro.tech b{color:var(--orange-d);}

/* CATEGORY GRID — ejecutivo, ocupa el alto disponible sin scroll */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;flex:1;min-height:0;}
.cat{position:relative;border:1.5px solid var(--line);border-radius:22px;background:var(--card);padding:16px;cursor:pointer;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .14s,box-shadow .14s,border-color .14s;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:10px;min-height:0;}
.cat:active{transform:scale(.97);}
.cat.sel{border-color:var(--orange);box-shadow:0 12px 30px rgba(244,154,15,.22);}
.cat .cat-ic{width:clamp(48px,12vh,64px);height:clamp(48px,12vh,64px);border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:clamp(24px,6vh,32px);background:var(--grad-soft);}
.cat .cat-name{font-size:clamp(15px,2.2vh,19px);font-weight:800;color:var(--carbon);letter-spacing:.2px;}
.cat .cat-sub{font-size:clamp(10px,1.5vh,12px);color:var(--muted);margin-top:1px;font-weight:500;}
.cat .glow{position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;background:var(--grad);opacity:.06;}
/* Config como botón chico en esquina inferior */
.cfg-corner{position:fixed;left:16px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:36;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;box-shadow:var(--shadow-sm);}
.cfg-corner:active{background:var(--paper);}
.cfg-corner .cg-ic{font-size:15px;}
@media (max-height:700px){
  .cat-grid{gap:9px;}
  .cat{padding:10px;border-radius:16px;gap:6px;}
  .cat .cat-ic{width:44px;height:44px;font-size:22px;}
  h2.q{font-size:18px;margin-bottom:8px;}
  .content{padding:12px 16px 88px;}
  .navbar{padding:10px 16px calc(10px + env(safe-area-inset-bottom));}
  .btn{padding:14px;}
  .progress{margin-bottom:10px;}
}
/* PIN pad */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:18px 0 22px;}
.pin-dots i{width:15px;height:15px;border-radius:50%;background:var(--line);transition:.15s;}
.pin-dots i.on{background:var(--grad);transform:scale(1.15);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:300px;margin:0 auto;}
.pin-key{border:1.5px solid var(--line);background:#fff;border-radius:16px;padding:18px 0;font-size:24px;font-weight:800;color:var(--carbon);cursor:pointer;}
.pin-key:active{background:var(--paper);}
.pin-key.wide{grid-column:span 1;}
.rep .rderiv{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:12px;margin-top:7px;margin-left:6px;background:rgba(23,105,170,.12);color:#1769AA;}

/* verifiers */
.verifier{margin-top:16px;}
.verifier .vtitle{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.vbtns{display:flex;gap:11px;}
.vbtn{flex:1;border:1.5px solid var(--line);border-radius:14px;padding:15px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:800;color:var(--carbon);}
.vbtn .ic{font-size:24px;}
.vbtn:active{background:var(--paper);}
.thumbs{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px;}
.thumb{position:relative;width:80px;height:80px;border-radius:13px;overflow:hidden;border:1px solid var(--line);}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;}
.thumb .del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1;}
.thumb .badge{position:absolute;bottom:0;left:0;right:0;background:rgba(42,42,42,.78);color:#fff;font-size:10px;text-align:center;padding:1px;}

/* nav */
.navbar{position:fixed;left:0;right:0;bottom:0;z-index:35;background:linear-gradient(to top,var(--paper) 72%,transparent);padding:15px 18px calc(15px + env(safe-area-inset-bottom));}
.navbar .inner{max-width:820px;margin:0 auto;display:flex;gap:11px;}
.btn{flex:1;border:none;border-radius:15px;padding:18px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn.primary{background:var(--carbon);color:#fff;box-shadow:0 6px 18px rgba(51,51,51,.28);}
.btn.primary:disabled{background:#C2C2BC;box-shadow:none;cursor:not-allowed;}
.btn.accent{background:var(--grad);color:#fff;box-shadow:0 6px 20px rgba(244,154,15,.32);}
.btn.accent:disabled{background:#CFCFCA;box-shadow:none;cursor:not-allowed;}
.btn.ghost{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);color:var(--muted);min-width:62px;}
.btn.finish{background:var(--green);color:#fff;box-shadow:0 6px 20px rgba(125,182,28,.32);}
.btn:active{transform:scale(.98);}
.progress{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:18px;}
.progress i{display:block;height:100%;background:var(--grad);transition:width .3s;}

/* camera */
.cam-bg{position:fixed;inset:0;background:#000;z-index:60;display:flex;flex-direction:column;}
.cam-bg video{flex:1;width:100%;object-fit:cover;}
.cam-bg .cambar{padding:20px;display:flex;align-items:center;justify-content:center;background:#000;}
.cam-bg .shoot{width:76px;height:76px;border-radius:50%;border:5px solid #fff;background:var(--red);cursor:pointer;}
.cam-bg .shoot.photo{background:#fff;}
.cam-bg .camclose{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.5);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;z-index:2;}
.cam-bg .rec{position:absolute;top:20px;right:20px;color:#fff;font-size:14px;font-weight:800;background:rgba(206,66,87,.85);padding:5px 13px;border-radius:22px;z-index:2;}

/* reports list */
.rep{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:11px;box-shadow:var(--shadow-sm);}
.rep .rh{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rep .rid{background:var(--grad);color:#fff;font-weight:800;font-size:13px;padding:4px 12px;border-radius:20px;letter-spacing:.5px;}
.rep .rcat{font-size:12px;color:var(--muted);font-weight:700;margin-left:auto;}
.rep .rtitle{font-weight:700;color:var(--carbon);font-size:15px;}
.rep .rmeta{font-size:12px;color:var(--muted);margin-top:5px;}
.rep .rstatus{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:12px;margin-top:7px;}
.rep .rstatus.ok{background:rgba(125,182,28,.15);color:var(--green-d);}
.rep .rstatus.pend{background:rgba(244,154,15,.15);color:var(--orange-d);}

.toast{position:fixed;left:50%;bottom:112px;transform:translateX(-50%);background:var(--carbon);color:#fff;padding:14px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:80;box-shadow:var(--shadow);max-width:90%;text-align:center;}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
.banner{background:var(--grad-soft);border:1px solid rgba(244,154,15,.3);color:#8a5a1e;border-radius:14px;padding:13px 15px;font-size:13px;margin-bottom:18px;line-height:1.45;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo" id="logoSlot"></div>
    <div class="brand"><b>SOSER</b><span id="modeLabel">Casos</span></div>
    <div class="right">
      <div class="gpschip hidden" id="gpsChip"><span class="dot wait" id="gpsDot"></span><span id="gpsTxt">GPS…</span></div>
      <button class="iconbtn hidden" id="btnHome" title="Inicio">⌂</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<div class="navbar hidden" id="navbar"><div class="inner">
  <button class="btn ghost" id="btnBack">‹</button>
  <button class="btn accent" id="btnNext">Continuar</button>
</div></div>
<div id="overlays"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
