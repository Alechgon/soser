<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#333333">
<title>SOSER · Agregar Caso</title>
<style>
:root{
  --carbon:#333333;--carbon-2:#262626;--ink:#2A2A2A;
  --orange:#F49A0F;--orange-d:#DE7C08;--green:#7DB61C;--green-d:#5E8E13;--leaf:#2E7D32;
  --paper:#F5F6F4;--card:#FFFFFF;--line:#E6E6E1;--muted:#8C8C86;--red:#CE4257;--blue:#1769AA;
  --shadow:0 12px 34px rgba(51,51,51,.12);--shadow-sm:0 4px 16px rgba(51,51,51,.08);
  --grad:linear-gradient(120deg,var(--orange),var(--green));
  --grad-soft:linear-gradient(135deg,rgba(244,154,15,.13),rgba(125,182,28,.13));
  --r:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;font-size:15px;-webkit-font-smoothing:antialiased;}
.hidden{display:none!important;}
.app{max-width:860px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
button{font-family:inherit;}
:focus-visible{outline:3px solid rgba(244,154,15,.55);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

/* TOPBAR */
.topbar{flex:0 0 auto;background:var(--carbon);color:#fff;display:flex;align-items:center;gap:13px;padding:13px 18px;padding-top:calc(13px + env(safe-area-inset-top));box-shadow:0 2px 18px rgba(0,0,0,.22);z-index:40;}
.logo{width:40px;height:40px;flex:0 0 auto;border-radius:12px;background:#fff;padding:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.18);}
.logo svg{width:100%;height:100%;}
.brand{display:flex;flex-direction:column;line-height:1.05;}
.brand b{font-size:18px;letter-spacing:2.5px;font-weight:800;}
.brand span{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.topbar .right{margin-left:auto;display:flex;gap:9px;align-items:center;}
.gpschip{display:flex;align-items:center;gap:6px;font-size:11px;color:#d3d3ce;background:rgba(255,255,255,.09);padding:6px 11px;border-radius:22px;font-weight:700;}
.gpschip .dot{width:7px;height:7px;border-radius:50%;background:#8a8a8a;}
.gpschip .dot.ok{background:var(--green);box-shadow:0 0 0 3px rgba(125,182,28,.25);}
.gpschip .dot.wait{background:var(--orange);animation:pulse 1.2s infinite;}
@keyframes pulse{50%{opacity:.4;}}
.iconbtn{background:rgba(255,255,255,.10);border:none;color:#fff;width:40px;height:40px;border-radius:11px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.iconbtn:active{background:rgba(255,255,255,.22);}

/* CONTENT */
.content{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;padding:16px 16px 0;overflow:hidden;}
.screen{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;animation:fade .3s cubic-bezier(.2,.7,.3,1);}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.navwrap{flex:0 0 auto;padding:14px 16px calc(14px + env(safe-area-inset-bottom));}
.navwrap .inner{display:flex;gap:11px;}
.btn{flex:1;border:none;border-radius:15px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn.primary{background:var(--carbon);color:#fff;box-shadow:0 6px 18px rgba(51,51,51,.26);}
.btn.primary:disabled{background:#C4C4BE;box-shadow:none;cursor:not-allowed;}
.btn.accent{background:var(--grad);color:#fff;box-shadow:0 6px 20px rgba(244,154,15,.30);}
.btn.accent:disabled{background:#D0D0CB;box-shadow:none;cursor:not-allowed;}
.btn.finish{background:var(--green);color:#fff;box-shadow:0 6px 20px rgba(125,182,28,.30);}
.btn.finish:disabled{background:#D0D0CB;box-shadow:none;cursor:not-allowed;}
.btn.ghost{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);color:var(--muted);min-width:60px;}
.btn:active{transform:scale(.98);}

/* HOME */
.hero{text-align:center;padding:22px 12px 4px;flex:0 0 auto;}
.hero .mark{width:92px;height:92px;border-radius:26px;margin:0 auto 16px;background:#fff;display:flex;align-items:center;justify-content:center;padding:15px;box-shadow:0 16px 40px rgba(244,154,15,.20),0 6px 16px rgba(125,182,28,.16);}
.hero h1{margin:6px 0 3px;font-size:25px;letter-spacing:.2px;color:var(--carbon);font-weight:800;}
.hero p{margin:0;color:var(--muted);font-size:14px;}
.home-actions{display:flex;flex-direction:column;gap:14px;margin-top:22px;flex:0 0 auto;}
.primary-action{background:var(--carbon);color:#fff;border:none;border-radius:var(--r);padding:24px 22px;display:flex;align-items:center;gap:18px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;text-align:left;}
.primary-action:active{transform:scale(.98);}
.primary-action.rep{background:linear-gradient(120deg,#3b3b3b,#2a2a2a);}
.primary-action .pa-ic{width:56px;height:56px;border-radius:16px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:27px;background:var(--grad);}
.primary-action.rep .pa-ic{background:var(--grad-soft);}
.primary-action h3{margin:0 0 3px;font-size:19px;font-weight:800;}
.primary-action p{margin:0;font-size:13px;color:#c9c9c4;font-weight:500;}
.primary-action .pa-arrow{margin-left:auto;font-size:26px;opacity:.7;}
.cfg-fab{margin:18px auto 0;width:58px;height:58px;border-radius:18px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:var(--shadow-sm);flex:0 0 auto;}
.cfg-fab:active{background:var(--paper);transform:scale(.96);}
.cfg-warn{background:var(--grad-soft);border:1px solid rgba(244,154,15,.4);color:#9a6207;border-radius:14px;padding:12px 14px;font-size:13px;margin-top:16px;text-align:center;line-height:1.4;flex:0 0 auto;}

/* CARD/FORM */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow-sm);}
.eyebrow{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:7px;}
.eyebrow b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.eyebrow .grp{color:var(--muted);font-weight:700;}
h2.q{font-size:21px;margin:2px 0 16px;line-height:1.3;color:var(--carbon);font-weight:800;}
label.fld{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=number],input[type=tel],input[type=url],textarea,select{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,154,15,.15);}
textarea{min-height:100px;resize:vertical;}
.field-block{margin-bottom:16px;}

/* SEARCH */
.search-wrap{position:relative;}
.search-wrap input{padding:15px 44px 15px 46px;border-radius:14px;font-weight:500;}
.search-wrap .ic-lead{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted);pointer-events:none;}
.suggest{position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:30;background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:0 18px 42px rgba(51,51,51,.18);max-height:46vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.suggest .sopt{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--paper);font-size:15px;font-weight:600;color:var(--carbon);display:flex;gap:11px;align-items:center;}
.suggest .sopt::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--grad);flex:0 0 auto;}
.suggest .sopt.nocase::before{background:#D6D6D0;}
.suggest .sopt small{display:block;color:var(--muted);font-size:12px;font-weight:500;margin-top:2px;}
.suggest .sopt:active,.suggest .sopt.hl{background:var(--paper);}
.suggest .sopt .stxt{flex:1;min-width:0;}
.casebadge{flex:0 0 auto;font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:12px;letter-spacing:.3px;white-space:nowrap;}
.casebadge.has{background:rgba(244,154,15,.16);color:var(--orange-d);}
.casebadge.none{background:#EFEFEC;color:var(--muted);}
.clearbtn{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:var(--paper);border:none;border-radius:10px;width:32px;height:32px;font-size:15px;cursor:pointer;color:var(--muted);}
.divider-or{display:flex;align-items:center;gap:12px;margin:8px 0 14px;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:1px;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--line);}

/* burbuja (chip) */
.bubble{display:inline-flex;align-items:center;gap:10px;background:var(--grad);color:#fff;border:none;border-radius:30px;padding:12px 18px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 8px 22px rgba(244,154,15,.30);animation:pop .3s cubic-bezier(.2,1.2,.4,1);max-width:100%;}
@keyframes pop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.bubble .b-ic{font-size:17px;}
.bubble .b-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bubble .b-edit{background:rgba(255,255,255,.25);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto;}
.bubble-row{margin-bottom:16px;animation:fade .3s;}

.readonly-grid{display:grid;gap:10px;grid-template-columns:1fr 1fr;}
.readonly-grid .ro.full{grid-column:1/-1;}
.ro{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:11px 13px;}
.ro span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:800;}
.ro b{font-size:14px;font-weight:700;word-break:break-word;color:var(--carbon);}
.ro.tech b{color:var(--orange-d);}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1 1 auto;min-height:0;}
.cat{position:relative;border:1.5px solid var(--line);border-radius:20px;background:var(--card);padding:14px;cursor:pointer;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .14s,box-shadow .14s,border-color .14s;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:8px;min-height:0;}
.cat:active{transform:scale(.96);border-color:var(--orange);}
.cat .cat-ic{width:clamp(42px,10vh,60px);height:clamp(42px,10vh,60px);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5.5vh,30px);background:var(--grad-soft);}
.cat .cat-name{font-size:clamp(15px,2.4vh,20px);font-weight:800;color:var(--carbon);letter-spacing:.2px;}
.cat .cat-sub{font-size:clamp(10px,1.5vh,12.5px);color:var(--muted);margin-top:1px;font-weight:600;}
.cat .glow{position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;background:var(--grad);opacity:.06;}
@media (orientation:landscape) and (max-height:560px){
  .cat-grid{grid-template-columns:repeat(3,1fr);gap:10px;}
  .cat{padding:10px;border-radius:16px;gap:5px;}
  .hero .mark{width:64px;height:64px;}
  h2.q{font-size:18px;margin-bottom:10px;}
}

/* verificadores + progreso */
.verifier{margin-top:14px;}
.verifier .vtitle{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px;}
.vbtns{display:flex;gap:11px;}
.vbtn{flex:1;border:1.5px solid var(--line);border-radius:14px;padding:14px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-size:13px;font-weight:800;color:var(--carbon);}
.vbtn .ic{font-size:23px;}
.vbtn:active{background:var(--paper);}
.thumbs{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px;}
.thumb{position:relative;width:82px;height:82px;border-radius:13px;overflow:hidden;border:1px solid var(--line);background:#000;}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;}
.thumb .del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1;z-index:3;}
.thumb .badge{position:absolute;bottom:0;left:0;right:0;background:rgba(42,42,42,.78);color:#fff;font-size:10px;text-align:center;padding:1px;z-index:2;}
.thumb .up{position:absolute;inset:0;background:rgba(42,42,42,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;gap:4px;border:none;width:100%;cursor:default;color:#fff;}
.thumb .up .ring{width:30px;height:30px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
.thumb .up.done{background:rgba(125,182,28,.35);}
.thumb .up.done .ok{color:#fff;font-size:26px;font-weight:800;}
.thumb .up.err{background:rgba(206,66,87,.6);cursor:pointer;}
.thumb .up.err .ok{font-size:18px;font-weight:800;}
.thumb .up.err .rt{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;background:rgba(0,0,0,.35);padding:2px 7px;border-radius:9px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* REPORTES */
.rep-head{flex:0 0 auto;}
.rep-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.tabs{display:flex;gap:8px;flex:1;background:#EDEDE9;padding:5px;border-radius:14px;}
.tab{flex:1;text-align:center;padding:11px;border-radius:11px;font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;border:none;background:none;transition:.15s;}
.tab.sel{background:#fff;color:var(--carbon);box-shadow:var(--shadow-sm);}
.refreshbtn{flex:0 0 auto;width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--carbon);font-size:19px;cursor:pointer;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;}
.refreshbtn:active{background:var(--paper);}
.refreshbtn.spin{animation:spin 1s linear infinite;}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:8px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 8px;text-align:center;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;cursor:pointer;font-family:inherit;transition:transform .1s,box-shadow .15s;}
.kpi:active{transform:scale(.97);}
.kpi.kpisel{border-color:var(--carbon);box-shadow:0 0 0 2px var(--carbon) inset,var(--shadow-sm);}
.kpi.der.kpisel{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue) inset,var(--shadow-sm);}
.kpi.sol.kpisel{border-color:var(--green-d);box-shadow:0 0 0 2px var(--green-d) inset,var(--shadow-sm);}
.kpi-filter-note{font-size:12px;color:var(--muted);text-align:center;margin:10px 0 2px;font-weight:600;}
.kpi .n{font-size:23px;font-weight:800;color:var(--carbon);line-height:1;}
.kpi .l{font-size:10px;color:var(--muted);font-weight:800;margin-top:3px;text-transform:uppercase;letter-spacing:.4px;}
.kpi.der .n{color:var(--blue);}.kpi.sol .n{color:var(--green-d);}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad);}
.kpi.der .bar{background:var(--blue);}.kpi.sol .bar{background:var(--green);}
.kpi-sub{font-size:11.5px;color:var(--muted);font-weight:700;margin:0 2px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.rep-search{position:relative;margin-bottom:12px;}
/* header del establecimiento seleccionado */
.est-card{background:linear-gradient(120deg,#3b3b3b,#2a2a2a);color:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);animation:fade .25s;}
.est-card .eic{width:42px;height:42px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;}
.est-card .einfo{flex:1;min-width:0;}
.est-card .ename{font-weight:800;font-size:14.5px;line-height:1.25;}
.est-card .emeta{font-size:11.5px;color:#c9c9c4;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.est-card .eclose{flex:0 0 auto;background:rgba(255,255,255,.14);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:15px;cursor:pointer;}
.rep-list{flex:1 1 auto;overflow-y:auto;min-height:0;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.rep{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);display:flex;gap:12px;align-items:stretch;transition:opacity .3s,background .3s;}
.rep.deleting{background:#EDEDEA;opacity:.6;}
.rep .rid{background:var(--grad);color:#fff;font-weight:800;font-size:13px;padding:8px 10px;border-radius:12px;display:flex;align-items:center;justify-content:center;min-width:64px;text-align:center;flex:0 0 auto;}
.rep.deleting .rid{background:#B8B8B2;}
.rep .rbody{flex:1;min-width:0;}
.rep .rtitle{font-weight:700;color:var(--carbon);font-size:14.5px;margin-bottom:3px;}
.rep .rdesc{color:#666;font-size:13px;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.rep .rmeta{font-size:11.5px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.rep .rstate{font-size:11px;font-weight:800;padding:2px 9px;border-radius:12px;}
.rep .rstate.fin{background:rgba(125,182,28,.15);color:var(--green-d);}
.rep .rstate.der{background:rgba(23,105,170,.12);color:var(--blue);}
.rep .rstate.vis{background:rgba(244,154,15,.15);color:var(--orange-d);}
.rep .rstate.pend{background:#EFEFEC;color:var(--muted);}
.rep .rside{display:flex;flex-direction:column;gap:6px;justify-content:center;flex:0 0 auto;}
.rep .rverif{background:var(--grad-soft);border:1px solid var(--line);color:var(--orange-d);border-radius:11px;padding:8px 6px;font-size:10px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px;}
.rep .rverif .vic{font-size:17px;}
.rep .rverif:active{background:rgba(244,154,15,.18);}
.rep .rsend{background:rgba(23,105,170,.1);border:1px solid rgba(23,105,170,.25);color:var(--blue);border-radius:11px;padding:8px 6px;font-size:10px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px;}
.rep .rdel{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px;flex:0 0 auto;align-self:flex-start;}

/* camera */
.cam-bg{position:fixed;inset:0;background:#000;z-index:60;display:flex;flex-direction:column;}
.cam-bg video{flex:1;width:100%;object-fit:cover;min-height:0;}
.cam-bg .cambar{padding:20px;display:flex;align-items:center;justify-content:center;background:#000;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.cam-bg .shoot{width:74px;height:74px;border-radius:50%;border:5px solid #fff;background:var(--red);cursor:pointer;}
.cam-bg .shoot.photo{background:#fff;}
.cam-bg .camclose{position:absolute;top:calc(16px + env(safe-area-inset-top));left:16px;background:rgba(0,0,0,.5);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;z-index:2;}
.cam-bg .rec{position:absolute;top:calc(18px + env(safe-area-inset-top));right:18px;color:#fff;font-size:14px;font-weight:800;background:rgba(206,66,87,.9);padding:5px 13px;border-radius:22px;z-index:2;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(42,42,42,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:70;display:flex;align-items:center;justify-content:center;padding:22px;animation:fade .2s;}
.modal{background:var(--card);border-radius:22px;width:100%;max-width:420px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:pop2 .25s cubic-bezier(.2,1.1,.4,1);}
@keyframes pop2{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal h3{margin:0 0 6px;font-size:19px;color:var(--carbon);}
.modal p{margin:0 0 14px;color:var(--muted);font-size:14px;}
.modal .mbtns{display:flex;gap:10px;margin-top:16px;}

/* Emergencia */
.emerg-action{background:linear-gradient(120deg,#D1495B,#B3283A);color:#fff;border:none;border-radius:var(--r);padding:20px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;box-shadow:0 8px 24px rgba(209,73,91,.4);transition:transform .12s;text-align:left;margin-bottom:14px;position:relative;overflow:hidden;}
.emerg-action:active{transform:scale(.98);}
.emerg-action .pa-ic{width:54px;height:54px;border-radius:15px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:28px;background:rgba(255,255,255,.18);}
.emerg-action h3{margin:0 0 2px;font-size:19px;font-weight:800;}
.emerg-action p{margin:0;font-size:12.5px;color:rgba(255,255,255,.85);font-weight:600;}
.emerg-action .pulse{position:absolute;right:-20px;top:-20px;width:90px;height:90px;border-radius:50%;background:#fff;opacity:.12;animation:epulse 1.8s ease-in-out infinite;}
@keyframes epulse{0%,100%{transform:scale(1);opacity:.12;}50%{transform:scale(1.25);opacity:.05;}}

/* VISOR de verificadores */
.bubble-head{flex:0 0 auto;background:linear-gradient(120deg,#3b3b3b,#2a2a2a);color:#fff;border-radius:20px;padding:16px 18px;box-shadow:0 10px 26px rgba(51,51,51,.28);margin-bottom:12px;}
.bubble-head.em{background:linear-gradient(120deg,var(--red),var(--red-d));}
.bubble-head .bh-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bubble-head .bh-id{background:rgba(255,255,255,.22);border-radius:10px;padding:5px 10px;font-weight:800;font-size:13px;}
.bubble-head .bh-state{margin-left:auto;background:rgba(255,255,255,.92);color:var(--carbon);border-radius:10px;padding:4px 10px;font-weight:800;font-size:11px;}
.bubble-head h3{margin:0 0 3px;font-size:17px;font-weight:800;}
.bubble-head .bh-meta{font-size:12px;color:rgba(255,255,255,.9);display:flex;gap:10px;flex-wrap:wrap;}
.bubble-head .bh-desc{margin-top:9px;font-size:13.5px;background:rgba(255,255,255,.15);border-radius:12px;padding:10px 12px;line-height:1.5;}
.d-lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 7px;}
.d-strip{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch;}
.d-vs{width:74px;height:74px;border-radius:12px;overflow:hidden;border:1px solid var(--line);flex:0 0 auto;position:relative;cursor:pointer;background:#000;}
.d-vs img,.d-vs video{width:100%;height:100%;object-fit:cover;}
.d-vt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;background:rgba(0,0,0,.25);}
.d-solbox{background:rgba(125,182,28,.07);border:1px solid rgba(125,182,28,.3);border-radius:16px;padding:14px 16px;margin-top:4px;}
.d-coment{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:14px;color:var(--ink);line-height:1.5;}
.d-coment.muted{color:var(--muted);font-style:italic;}
.d-fecha{font-size:12.5px;color:var(--green-d);font-weight:700;margin-top:8px;}
.viewer-bg{position:fixed;inset:0;background:rgba(20,20,20,.94);z-index:75;display:flex;flex-direction:column;animation:fade .2s;touch-action:pan-y;}
.viewer-top{display:flex;align-items:center;gap:12px;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));color:#fff;}
.viewer-top .vcount{font-weight:800;font-size:15px;}
.viewer-top .vopen{margin-left:auto;background:rgba(255,255,255,.12);border:none;color:#fff;height:40px;padding:0 14px;border-radius:11px;font-size:12.5px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;}
.viewer-top .vclose{background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:11px;font-size:20px;cursor:pointer;flex:0 0 auto;}
.viewer-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;padding:0 8px;}
.viewer-stage img,.viewer-stage video{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px;}
.viewer-stage iframe{width:min(100%,760px);height:min(100%,72vh);border:none;border-radius:10px;background:#000;}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.16);border:none;color:#fff;width:48px;height:48px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;}
.viewer-nav.prev{left:10px;}.viewer-nav.next{right:10px;}
.viewer-nav:disabled{opacity:.25;}
.viewer-cap{padding:14px 16px calc(18px + env(safe-area-inset-bottom));color:#ddd;font-size:13px;text-align:center;word-break:break-all;}
.viewer-load{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#bbb;font-size:13px;font-weight:700;}
.viewer-load .ring{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
.viewer-miss{color:#ddd;text-align:center;padding:24px;font-size:14px;line-height:1.6;}
.viewer-miss a{color:var(--orange);font-weight:800;}

/* upload bar global */
.upglobal{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-top:10px;box-shadow:var(--shadow-sm);}
.upglobal .ut{display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:var(--carbon);margin-bottom:7px;}
.upglobal .ut .st{color:var(--muted);}
.upglobal .track{height:7px;background:var(--line);border-radius:6px;overflow:hidden;}
.upglobal .track i{display:block;height:100%;width:0;background:var(--grad);transition:width .3s;border-radius:6px;}
.upglobal.ok .track i{background:var(--green);}
.upglobal.err{border-color:var(--red);}

/* video trimmer */
.trim-bg{position:fixed;inset:0;background:rgba(20,20,20,.95);z-index:78;display:flex;flex-direction:column;animation:fade .2s;}
.trim-top{padding:16px;padding-top:calc(16px + env(safe-area-inset-top));color:#fff;display:flex;align-items:center;gap:10px;}
.trim-top b{font-size:16px;}
.trim-top .tx{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:11px;font-size:20px;cursor:pointer;}
.trim-video{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:0 10px;}
.trim-video video{max-width:100%;max-height:100%;border-radius:10px;}
.trim-ctrl{padding:16px 18px calc(18px + env(safe-area-inset-bottom));color:#fff;}
.trim-info{text-align:center;font-size:13px;color:#ccc;margin-bottom:12px;}
.trim-info b{color:var(--orange);}
.trim-track{position:relative;height:56px;background:#333;border-radius:12px;margin-bottom:16px;overflow:hidden;}
.trim-sel{position:absolute;top:0;bottom:0;background:rgba(244,154,15,.25);border-left:3px solid var(--orange);border-right:3px solid var(--green);}
.trim-handle{position:absolute;top:0;bottom:0;width:22px;background:var(--orange);cursor:ew-resize;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;touch-action:none;}
.trim-handle.end{background:var(--green);}
.trim-btns{display:flex;gap:11px;}

.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--carbon);color:#fff;padding:14px 22px;border-radius:30px;font-size:14px;font-weight:700;z-index:80;box-shadow:var(--shadow);max-width:90%;text-align:center;}
.note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
.banner{background:var(--grad-soft);border:1px solid rgba(244,154,15,.3);color:#8a5a1e;border-radius:14px;padding:12px 14px;font-size:13px;margin-bottom:16px;line-height:1.45;}
.empty{text-align:center;padding:34px 18px;color:var(--muted);}
.empty .ic{font-size:38px;margin-bottom:10px;}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
.loading{padding:30px;text-align:center;color:var(--muted);font-weight:700;}
.loading .spinner{border-color:rgba(140,140,134,.3);border-top-color:var(--orange);}

/* PIN */
.pin-dots{display:flex;gap:11px;justify-content:center;margin:16px 0 20px;}
.pin-dots i{width:14px;height:14px;border-radius:50%;background:var(--line);transition:.15s;}
.pin-dots i.on{background:var(--grad);transform:scale(1.15);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;max-width:290px;margin:0 auto;}
.pin-key{border:1.5px solid var(--line);background:#fff;border-radius:16px;padding:16px 0;font-size:23px;font-weight:800;color:var(--carbon);cursor:pointer;}
.pin-key:active{background:var(--paper);}

/* ===== RESPONSIVO: tablet / desktop ===== */
@media (min-width:700px){
  .content{padding:22px 26px 0;}
  .navwrap{padding:16px 26px calc(16px + env(safe-area-inset-bottom));}
  .kpis{gap:12px;}
  .kpi{padding:15px 10px;}
  .kpi .n{font-size:28px;}
  .kpi .l{font-size:11px;}
  .rep .rtitle{font-size:15.5px;}
  .cat-grid{grid-template-columns:repeat(3,1fr);}
  .home-actions{max-width:620px;margin-left:auto;margin-right:auto;width:100%;}
  .suggest{max-height:52vh;}
}
@media (min-width:1000px){
  .app{max-width:960px;}
}
</style>
</head>

  <div class="topbar">
    <div class="logo" id="logoSlot"></div>
    <div class="brand"><b>SOSER</b><span id="modeLabel">Casos</span></div>
    <div class="right">
      <div class="gpschip hidden" id="gpsChip"><span class="dot wait" id="gpsDot"></span><span id="gpsTxt">GPS…</span></div>
      <button class="iconbtn hidden" id="btnHome" title="Inicio">⌂</button>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="navwrap hidden" id="navwrap"><div class="inner">
    <button class="btn ghost" id="btnBack">‹</button>
    <button class="btn accent" id="btnNext">Continuar</button>
  </div></div>
</div>
<div id="overlays"></div>
<script src="data.js"></script>
<script src="app.js"></script>
