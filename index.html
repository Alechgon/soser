<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOSER · Bitácora de Mantención</title>
<style>
:root{
  --soser-deep:#0B2D4A;      /* azul profundo institucional */
  --soser-blue:#1769AA;      /* azul medio */
  --soser-sky:#3DA5D9;       /* celeste acento */
  --soser-amber:#F2A65A;     /* ámbar (calor/alerta suave) */
  --soser-red:#D1495B;       /* rojo no conformidad */
  --soser-green:#2E9E6B;     /* verde conforme */
  --ink:#0E1B25;
  --paper:#F5F8FA;
  --card:#FFFFFF;
  --line:#D9E2E8;
  --muted:#5C7283;
  --shadow:0 4px 20px rgba(11,45,74,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper);color:var(--ink);
  line-height:1.45;font-size:16px;
  overscroll-behavior-y:none;
}
.hidden{display:none !important;}
.app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* ---------- TOP BAR ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:var(--soser-deep);color:#fff;
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;box-shadow:var(--shadow);
}
.logo{
  width:38px;height:38px;border-radius:9px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--soser-sky),var(--soser-blue));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:18px;letter-spacing:.5px;color:#fff;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.18);
}
.brand{display:flex;flex-direction:column;line-height:1.05;}
.brand b{font-size:17px;letter-spacing:.4px;}
.brand span{font-size:11px;color:var(--soser-sky);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.topbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.iconbtn{
  background:rgba(255,255,255,.10);border:none;color:#fff;
  width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.iconbtn:active{background:rgba(255,255,255,.22);}

/* ---------- CONTENT ---------- */
.content{flex:1;padding:18px 16px 120px;}
.screen{animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ---------- HOME ---------- */
.home-hero{
  text-align:center;padding:26px 10px 10px;
}
.home-hero .mark{
  width:84px;height:84px;border-radius:22px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--soser-blue),var(--soser-deep));
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:800;color:#fff;letter-spacing:1px;
  box-shadow:0 10px 30px rgba(23,105,170,.35),inset 0 0 0 3px rgba(255,255,255,.15);
}
.home-hero h1{margin:6px 0 2px;font-size:23px;letter-spacing:.3px;}
.home-hero p{margin:0;color:var(--muted);font-size:14px;}
.home-choices{display:grid;gap:14px;margin-top:26px;}
.choice{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:22px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .12s,border-color .12s;
}
.choice:active{transform:scale(.98);}
.choice .emoji{
  width:54px;height:54px;border-radius:14px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.choice.prev .emoji{background:rgba(46,158,107,.14);}
.choice.corr .emoji{background:rgba(209,73,91,.14);}
.choice h3{margin:0 0 3px;font-size:18px;}
.choice p{margin:0;color:var(--muted);font-size:13px;}
.choice .arrow{margin-left:auto;color:var(--soser-blue);font-size:22px;}

/* ---------- CARDS / FORM ---------- */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px;box-shadow:var(--shadow);margin-bottom:16px;
}
.step-eyebrow{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--soser-blue);margin-bottom:4px;
}
.step-eyebrow .grp{color:var(--muted);}
h2.q{font-size:20px;margin:2px 0 16px;line-height:1.3;}
label.fld{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px;}
input[type=text],input[type=number],textarea,select{
  width:100%;border:1.5px solid var(--line);border-radius:11px;
  padding:13px 14px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--soser-sky);box-shadow:0 0 0 3px rgba(61,165,217,.18);}
textarea{min-height:90px;resize:vertical;}

/* search autocomplete */
.search-wrap{position:relative;}
.suggest{
  position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:30;
  background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;
  box-shadow:0 12px 30px rgba(11,45,74,.18);max-height:260px;overflow-y:auto;
}
.suggest div{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--paper);font-size:14px;}
.suggest div small{display:block;color:var(--muted);font-size:12px;}
.suggest div:active,.suggest div.hl{background:var(--paper);}
.clearbtn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:var(--paper);border:none;border-radius:8px;width:30px;height:30px;
  font-size:15px;cursor:pointer;color:var(--muted);
}

.field-block{margin-bottom:14px;}
.readonly-grid{display:grid;gap:10px;}
.ro{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:10px 13px;}
.ro span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;}
.ro b{font-size:15px;font-weight:600;word-break:break-word;}

/* choice chips (si/no, options) */
.opts{display:grid;gap:10px;grid-template-columns:1fr 1fr;}
.opts.one{grid-template-columns:1fr;}
.opt{
  border:1.5px solid var(--line);border-radius:13px;padding:15px;text-align:center;
  font-size:16px;font-weight:600;cursor:pointer;background:#fff;transition:.12s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.opt:active{transform:scale(.97);}
.opt.sel{border-color:var(--soser-blue);background:rgba(23,105,170,.07);color:var(--soser-deep);}
.opt.sel.yes{border-color:var(--soser-green);background:rgba(46,158,107,.10);color:var(--soser-green);}
.opt.sel.no{border-color:var(--soser-red);background:rgba(209,73,91,.10);color:var(--soser-red);}

/* counter / stepper */
.stepper{display:flex;align-items:center;gap:14px;}
.stepper button{
  width:52px;height:52px;border-radius:13px;border:1.5px solid var(--line);
  background:#fff;font-size:24px;font-weight:700;color:var(--soser-blue);cursor:pointer;
}
.stepper button:active{background:var(--paper);}
.stepper .val{font-size:30px;font-weight:800;min-width:54px;text-align:center;}

/* indique + verifier */
.indique{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;animation:fade .2s;}
.indique .reqtag{display:inline-block;background:rgba(209,73,91,.12);color:var(--soser-red);
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.verifier{margin-top:12px;}
.verifier .vtitle{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.vbtns{display:flex;gap:10px;}
.vbtn{
  flex:1;border:1.5px solid var(--line);border-radius:12px;padding:12px;background:#fff;
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:13px;font-weight:600;color:var(--soser-blue);
}
.vbtn .ic{font-size:22px;}
.vbtn:active{background:var(--paper);}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.thumb{position:relative;width:74px;height:74px;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;}
.thumb .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;line-height:1;}
.thumb .badge{position:absolute;bottom:0;left:0;right:0;background:rgba(11,45,74,.75);color:#fff;font-size:10px;text-align:center;padding:1px;}

/* dynamic equipment rows (frio) */
.equip-add{display:flex;gap:8px;margin-bottom:12px;}
.equip-add select{flex:1;}
.equip-row{display:grid;grid-template-columns:1fr 84px 64px 36px;gap:8px;align-items:center;margin-bottom:8px;}
.equip-row .nm{font-weight:600;font-size:14px;padding:10px;background:var(--paper);border-radius:10px;border:1px solid var(--line);}
.equip-row input{padding:10px;}
.equip-row .rm{background:rgba(209,73,91,.10);color:var(--soser-red);border:none;border-radius:9px;height:42px;font-size:18px;cursor:pointer;}
.equip-head{display:grid;grid-template-columns:1fr 84px 64px 36px;gap:8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;padding:0 2px;}

/* nav buttons */
.navbar{
  position:fixed;left:0;right:0;bottom:0;z-index:35;
  background:linear-gradient(to top,var(--paper) 70%,transparent);
  padding:14px 16px calc(14px + env(safe-area-inset-bottom));
}
.navbar .inner{max-width:760px;margin:0 auto;display:flex;gap:10px;}
.btn{
  flex:1;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn.primary{background:var(--soser-blue);color:#fff;box-shadow:0 6px 18px rgba(23,105,170,.35);}
.btn.primary:disabled{background:#A9C3D4;box-shadow:none;cursor:not-allowed;}
.btn.ghost{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);color:var(--muted);min-width:58px;}
.btn.finish{background:var(--soser-green);color:#fff;box-shadow:0 6px 18px rgba(46,158,107,.35);}
.btn:active{transform:scale(.98);}

/* progress */
.progress{height:5px;background:var(--line);border-radius:5px;overflow:hidden;margin-bottom:16px;}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--soser-sky),var(--soser-blue));transition:width .3s;}

/* drawer (resumen secciones) */
.drawer-bg{position:fixed;inset:0;background:rgba(11,27,37,.5);z-index:50;animation:fade .2s;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(420px,90vw);background:var(--paper);z-index:51;
  box-shadow:-10px 0 40px rgba(0,0,0,.25);display:flex;flex-direction:column;animation:slide .25s;
}
@keyframes slide{from{transform:translateX(100%);}to{transform:none;}}
.drawer header{background:var(--soser-deep);color:#fff;padding:16px;display:flex;align-items:center;gap:10px;}
.drawer header b{font-size:16px;}
.drawer header .iconbtn{margin-left:auto;}
.drawer .body{flex:1;overflow-y:auto;padding:14px;}
.acc{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.acc>.head{padding:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;}
.acc>.head .cnt{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600;}
.acc .activos{padding:0 12px 8px;}
.acc .activo{border-top:1px solid var(--paper);}
.acc .activo>.ah{padding:11px 4px;font-weight:600;font-size:14px;cursor:pointer;display:flex;gap:6px;align-items:center;color:var(--soser-blue);}
.acc .activo .qa{padding:4px 8px 12px;font-size:13px;}
.qa .qrow{padding:8px 0;border-bottom:1px solid var(--paper);}
.qa .qrow .qq{color:var(--muted);font-size:12px;}
.qa .qrow .aa{font-weight:600;}
.qa .qrow .aa.no{color:var(--soser-red);}
.qa .qrow .aa.yes{color:var(--soser-green);}
.qa .mini-thumbs{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.qa .mini-thumbs img,.qa .mini-thumbs video{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}
.jumpbtn{background:rgba(23,105,170,.08);color:var(--soser-blue);border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;}

/* camera modal */
.cam-bg{position:fixed;inset:0;background:#000;z-index:60;display:flex;flex-direction:column;}
.cam-bg video{flex:1;width:100%;object-fit:cover;}
.cam-bg .cambar{padding:18px;display:flex;align-items:center;justify-content:center;gap:30px;background:#000;}
.cam-bg .shoot{width:72px;height:72px;border-radius:50%;border:5px solid #fff;background:var(--soser-red);cursor:pointer;}
.cam-bg .shoot.photo{background:#fff;}
.cam-bg .camclose{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.5);color:#fff;border:none;width:42px;height:42px;border-radius:50%;font-size:20px;cursor:pointer;z-index:2;}
.cam-bg .rec{position:absolute;top:18px;right:18px;color:#fff;font-size:14px;font-weight:700;background:rgba(209,73,91,.85);padding:4px 12px;border-radius:20px;z-index:2;}
.cam-bg .mrzhint{position:absolute;top:0;left:0;right:0;bottom:90px;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.cam-bg .mrzbox{border:2px dashed rgba(255,255,255,.8);border-radius:10px;width:84%;height:120px;display:flex;align-items:flex-end;justify-content:center;}
.cam-bg .mrzbox span{background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:4px 10px;border-radius:8px;margin-bottom:-30px;}

/* receptor / ID */
.person-list{margin-top:12px;}
.person{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;}
.person .pr{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;}
.person .pr b{font-weight:600;}
.toast{
  position:fixed;left:50%;bottom:100px;transform:translateX(-50%);
  background:var(--soser-deep);color:#fff;padding:12px 20px;border-radius:30px;
  font-size:14px;font-weight:600;z-index:80;box-shadow:var(--shadow);animation:fade .2s;
}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.4;}
.banner{background:rgba(242,166,90,.14);border:1px solid var(--soser-amber);color:#8a5a22;border-radius:12px;padding:11px 13px;font-size:13px;margin-bottom:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">S</div>
    <div class="brand"><b>SOSER</b><span id="modeLabel">Bitácora</span></div>
    <div class="right">
      <button class="iconbtn hidden" id="btnDrawer" title="Ver secciones">☰</button>
    </div>
  </div>
  <div class="content" id="content"><!-- screens injected here --></div>
</div>

<div class="navbar hidden" id="navbar">
  <div class="inner">
    <button class="btn ghost" id="btnBack">‹</button>
    <button class="btn primary" id="btnNext">Continuar</button>
  </div>
</div>

<div id="overlays"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
