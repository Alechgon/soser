<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOSER · Bitácora de Mantención</title>
<style>
:root{
  --carbon:#3F3F3F;          /* gris carbón SOSER (texto/base) */
  --carbon-dark:#2C2C2C;
  --ink:#2C2C2C;
  --orange:#F39A12;          /* naranja gota */
  --orange-d:#E07B0A;
  --green:#7CB518;           /* verde gota */
  --green-d:#5C8A12;
  --leaf:#2E7D32;
  --paper:#F6F6F4;
  --card:#FFFFFF;
  --line:#E2E2DE;
  --muted:#8A8A85;
  --red:#D1495B;
  --shadow:0 6px 24px rgba(63,63,63,.10);
  --grad:linear-gradient(120deg,var(--orange),var(--green));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.45;font-size:16px;
  overscroll-behavior-y:none;
}
.hidden{display:none !important;}
.app{max-width:780px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{
  position:sticky;top:0;z-index:40;background:var(--carbon);color:#fff;
  display:flex;align-items:center;gap:12px;padding:13px 16px;
  box-shadow:0 2px 14px rgba(0,0,0,.18);
}
.logo{width:40px;height:40px;flex:0 0 auto;border-radius:11px;background:#fff;padding:4px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.logo svg{width:100%;height:100%;}
.brand{display:flex;flex-direction:column;line-height:1.05;}
.brand b{font-size:18px;letter-spacing:2px;font-weight:800;}
.brand span{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.topbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.gpschip{display:flex;align-items:center;gap:5px;font-size:11px;color:#cfcfca;background:rgba(255,255,255,.08);
  padding:5px 9px;border-radius:20px;font-weight:600;}
.gpschip .dot{width:7px;height:7px;border-radius:50%;background:#888;}
.gpschip .dot.ok{background:var(--green);box-shadow:0 0 0 3px rgba(124,181,24,.25);}
.gpschip .dot.wait{background:var(--orange);animation:pulse 1.2s infinite;}
@keyframes pulse{50%{opacity:.4;}}
.iconbtn{background:rgba(255,255,255,.10);border:none;color:#fff;width:40px;height:40px;border-radius:10px;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.iconbtn:active{background:rgba(255,255,255,.22);}

.content{flex:1;padding:18px 16px 130px;}
.screen{animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* HOME */
.home-hero{text-align:center;padding:30px 10px 6px;}
.home-hero .mark{width:96px;height:96px;border-radius:26px;margin:0 auto 18px;background:#fff;
  display:flex;align-items:center;justify-content:center;padding:14px;
  box-shadow:0 12px 34px rgba(243,154,18,.22),0 4px 12px rgba(124,181,24,.18);}
.home-hero .mark svg{width:100%;height:100%;}
.home-hero h1{margin:6px 0 2px;font-size:24px;letter-spacing:.3px;color:var(--carbon);}
.home-hero p{margin:0;color:var(--muted);font-size:14px;}
.home-choices{display:grid;gap:14px;margin-top:28px;}
.choice{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 20px;
  display:flex;align-items:center;gap:16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;}
.choice:active{transform:scale(.98);}
.choice .emoji{width:56px;height:56px;border-radius:15px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:27px;}
.choice.prev .emoji{background:rgba(124,181,24,.14);}
.choice.corr .emoji{background:rgba(243,154,18,.16);}
.choice h3{margin:0 0 3px;font-size:18px;color:var(--carbon);}
.choice p{margin:0;color:var(--muted);font-size:13px;}
.choice .arrow{margin-left:auto;color:var(--orange-d);font-size:24px;font-weight:700;}

/* CARDS / FORM */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.step-eyebrow{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:6px;}
.step-eyebrow b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.step-eyebrow .grp{color:var(--muted);font-weight:700;}
h2.q{font-size:21px;margin:2px 0 16px;line-height:1.3;color:var(--carbon);}
label.fld{display:block;font-size:13px;font-weight:700;color:var(--muted);margin:0 0 7px;text-transform:uppercase;letter-spacing:.4px;}
input[type=text],input[type=number],input[type=tel],textarea,select{
  width:100%;border:1.5px solid var(--line);border-radius:12px;padding:14px 15px;font-size:16px;
  font-family:inherit;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(243,154,18,.16);}
textarea{min-height:92px;resize:vertical;}

/* SEARCH — más presencia, no simplista */
.search-wrap{position:relative;}
.search-wrap input{padding:16px 44px 16px 46px;font-size:16px;font-weight:500;border-radius:14px;background:#fff;}
.search-wrap .ic-lead{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted);pointer-events:none;}
.suggest{position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:30;background:#fff;border:1px solid var(--line);
  border-radius:14px;overflow:hidden;box-shadow:0 16px 38px rgba(63,63,63,.18);max-height:300px;overflow-y:auto;}
.suggest div{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--paper);font-size:15px;font-weight:600;color:var(--carbon);display:flex;align-items:center;gap:10px;}
.suggest div::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--grad);flex:0 0 auto;}
.suggest div small{display:block;color:var(--muted);font-size:12px;font-weight:500;margin-top:2px;}
.suggest div:active,.suggest div.hl{background:var(--paper);}
.clearbtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--paper);border:none;border-radius:9px;width:32px;height:32px;font-size:15px;cursor:pointer;color:var(--muted);}
.divider-or{display:flex;align-items:center;gap:12px;margin:6px 0 14px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--line);}

.field-block{margin-bottom:16px;}
.readonly-grid{display:grid;gap:10px;grid-template-columns:1fr 1fr;}
.readonly-grid .ro.full{grid-column:1/-1;}
.ro{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 13px;}
.ro span{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:800;}
.ro b{font-size:14.5px;font-weight:600;word-break:break-word;color:var(--carbon);}

/* options */
.opts{display:grid;gap:11px;grid-template-columns:1fr 1fr;}
.opts.one{grid-template-columns:1fr;}
.opt{border:1.5px solid var(--line);border-radius:14px;padding:16px;text-align:center;font-size:16px;font-weight:600;
  cursor:pointer;background:#fff;transition:.12s;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--carbon);}
.opt:active{transform:scale(.97);}
.opt.sel{border-color:var(--orange);background:rgba(243,154,18,.08);}
.opt.sel.yes{border-color:var(--green);background:rgba(124,181,24,.12);color:var(--green-d);}
.opt.sel.no{border-color:var(--red);background:rgba(209,73,91,.10);color:var(--red);}

.stepper{display:flex;align-items:center;gap:14px;}
.stepper button{width:54px;height:54px;border-radius:14px;border:1.5px solid var(--line);background:#fff;font-size:25px;font-weight:700;color:var(--orange-d);cursor:pointer;}
.stepper button:active{background:var(--paper);}
.stepper .val{font-size:32px;font-weight:800;min-width:56px;text-align:center;color:var(--carbon);}

.indique{margin-top:14px;border-top:1px dashed var(--line);padding-top:15px;animation:fade .2s;}
.indique .reqtag{display:inline-block;background:rgba(209,73,91,.12);color:var(--red);font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px;}
.verifier{margin-top:13px;}
.verifier .vtitle{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:9px;}
.vbtns{display:flex;gap:10px;}
.vbtn{flex:1;border:1.5px solid var(--line);border-radius:13px;padding:13px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-size:13px;font-weight:700;color:var(--carbon);}
.vbtn .ic{font-size:23px;}
.vbtn:active{background:var(--paper);}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;}
.thumb{position:relative;width:76px;height:76px;border-radius:11px;overflow:hidden;border:1px solid var(--line);}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;}
.thumb .del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:21px;height:21px;font-size:12px;cursor:pointer;line-height:1;}
.thumb .badge{position:absolute;bottom:0;left:0;right:0;background:rgba(44,44,44,.78);color:#fff;font-size:10px;text-align:center;padding:1px;}

.equip-add{display:flex;gap:8px;margin-bottom:12px;}
.equip-add select{flex:1;}
.equip-row{display:grid;grid-template-columns:1fr 84px 64px 38px;gap:8px;align-items:center;margin-bottom:8px;}
.equip-row .nm{font-weight:600;font-size:14px;padding:11px;background:var(--paper);border-radius:11px;border:1px solid var(--line);}
.equip-row input{padding:11px;}
.equip-row .rm{background:rgba(209,73,91,.10);color:var(--red);border:none;border-radius:10px;height:44px;font-size:18px;cursor:pointer;}
.equip-head{display:grid;grid-template-columns:1fr 84px 64px 38px;gap:8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;padding:0 2px;}

/* nav */
.navbar{position:fixed;left:0;right:0;bottom:0;z-index:35;background:linear-gradient(to top,var(--paper) 72%,transparent);padding:14px 16px calc(14px + env(safe-area-inset-bottom));}
.navbar .inner{max-width:780px;margin:0 auto;display:flex;gap:10px;}
.btn{flex:1;border:none;border-radius:14px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn.primary{background:var(--carbon);color:#fff;box-shadow:0 6px 18px rgba(63,63,63,.28);}
.btn.primary:disabled{background:#BFBFBA;box-shadow:none;cursor:not-allowed;}
.btn.accent{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(243,154,18,.32);}
.btn.accent:disabled{background:#CFCFCA;box-shadow:none;}
.btn.ghost{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);color:var(--muted);min-width:60px;}
.btn.finish{background:var(--green);color:#fff;box-shadow:0 6px 18px rgba(124,181,24,.32);}
.btn:active{transform:scale(.98);}

.progress{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:16px;}
.progress i{display:block;height:100%;background:var(--grad);transition:width .3s;}

/* drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(44,44,44,.5);z-index:50;animation:fade .2s;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(430px,92vw);background:var(--paper);z-index:51;box-shadow:-10px 0 40px rgba(0,0,0,.25);display:flex;flex-direction:column;animation:slide .25s;}
@keyframes slide{from{transform:translateX(100%);}to{transform:none;}}
.drawer header{background:var(--carbon);color:#fff;padding:16px;display:flex;align-items:center;gap:10px;}
.drawer header b{font-size:16px;}
.drawer header .iconbtn{margin-left:auto;}
.drawer .body{flex:1;overflow-y:auto;padding:14px;}
.acc{background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden;}
.acc>.head{padding:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--carbon);}
.acc>.head .cnt{margin-left:auto;font-size:12px;color:var(--muted);font-weight:700;}
.acc .activos{padding:0 12px 8px;}
.acc .activo{border-top:1px solid var(--paper);}
.acc .activo>.ah{padding:11px 4px;font-weight:700;font-size:14px;cursor:pointer;display:flex;gap:6px;align-items:center;color:var(--orange-d);}
.acc .activo .qa{padding:4px 8px 12px;font-size:13px;}
.qa .qrow{padding:8px 0;border-bottom:1px solid var(--paper);}
.qa .qrow .qq{color:var(--muted);font-size:12px;}
.qa .qrow .aa{font-weight:700;}
.qa .qrow .aa.no{color:var(--red);}.qa .qrow .aa.yes{color:var(--green-d);}
.qa .mini-thumbs{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.qa .mini-thumbs img,.qa .mini-thumbs video{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}
.jumpbtn{background:rgba(243,154,18,.10);color:var(--orange-d);border:none;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:800;cursor:pointer;margin-top:6px;}

/* camera */
.cam-bg{position:fixed;inset:0;background:#000;z-index:60;display:flex;flex-direction:column;}
.cam-bg video{flex:1;width:100%;object-fit:cover;}
.cam-bg .cambar{padding:18px;display:flex;align-items:center;justify-content:center;gap:30px;background:#000;}
.cam-bg .shoot{width:74px;height:74px;border-radius:50%;border:5px solid #fff;background:var(--red);cursor:pointer;}
.cam-bg .shoot.photo{background:#fff;}
.cam-bg .camclose{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.5);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;z-index:2;}
.cam-bg .rec{position:absolute;top:18px;right:18px;color:#fff;font-size:14px;font-weight:800;background:rgba(209,73,91,.85);padding:4px 12px;border-radius:20px;z-index:2;}
.cam-bg .scanhint{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:14px;}
.cam-bg .scanbox{border:3px solid rgba(255,255,255,.9);border-radius:14px;width:84%;max-width:380px;height:150px;position:relative;box-shadow:0 0 0 2000px rgba(0,0,0,.35);}
.cam-bg .scanbox .laser{position:absolute;left:6px;right:6px;height:3px;background:var(--orange);box-shadow:0 0 12px var(--orange);animation:scan 1.8s linear infinite;border-radius:3px;}
@keyframes scan{0%{top:8px;}50%{top:140px;}100%{top:8px;}}
.cam-bg .scanlabel{background:rgba(0,0,0,.65);color:#fff;font-size:13px;font-weight:700;padding:7px 16px;border-radius:22px;}
.cam-bg .scanlabel.found{background:var(--green);}

/* signature */
.sigpad{border:2px dashed var(--line);border-radius:14px;background:#fff;touch-action:none;width:100%;height:180px;display:block;}
.sigtools{display:flex;gap:10px;margin-top:10px;}
.sigtools button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:11px;font-weight:700;cursor:pointer;color:var(--muted);}

/* person/validate */
.person{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;}
.person .pr{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;gap:10px;}
.person .pr span{color:var(--muted);}.person .pr b{font-weight:600;text-align:right;color:var(--carbon);}
.validate-card .sigshow{border:1px solid var(--line);border-radius:12px;background:#fff;padding:8px;margin-top:10px;}
.validate-card .sigshow img{width:100%;height:auto;}

/* ticket */
.ticket{background:#fff;border:1px solid var(--line);border-left:5px solid var(--orange);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-top:14px;animation:fade .25s;}
.ticket .tnum{display:inline-flex;align-items:center;gap:7px;background:var(--grad);color:#fff;font-weight:800;font-size:14px;padding:5px 13px;border-radius:22px;letter-spacing:.5px;margin-bottom:10px;}
.ticket .trow{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--paper);font-size:14px;}
.ticket .trow span{color:var(--muted);font-weight:600;}
.ticket .trow b{text-align:right;color:var(--carbon);font-weight:600;}
.ticket .tdesc{font-size:16px;font-weight:700;color:var(--carbon);margin:4px 0 12px;}

.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--carbon);color:#fff;padding:13px 22px;border-radius:30px;font-size:14px;font-weight:700;z-index:80;box-shadow:var(--shadow);animation:fade .2s;max-width:90%;text-align:center;}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.note{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.45;}
.banner{background:rgba(243,154,18,.10);border:1px solid rgba(243,154,18,.4);color:#9a6207;border-radius:13px;padding:12px 14px;font-size:13px;margin-bottom:16px;line-height:1.4;}
.section-pills{display:grid;gap:11px;grid-template-columns:1fr 1fr;}
.pill{border:1.5px solid var(--line);border-radius:15px;padding:20px 14px;text-align:center;cursor:pointer;background:#fff;transition:.12s;}
.pill:active{transform:scale(.97);}
.pill.sel{border-color:var(--orange);background:rgba(243,154,18,.08);}
.pill .pic{font-size:30px;display:block;margin-bottom:7px;}
.pill b{font-size:15px;color:var(--carbon);}
.addticket-btn{width:100%;border:1.5px dashed var(--orange);background:rgba(243,154,18,.06);color:var(--orange-d);border-radius:14px;padding:15px;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:9px;}
.addticket-btn:active{background:rgba(243,154,18,.12);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo" id="logoSlot"></div>
    <div class="brand"><b>SOSER</b><span id="modeLabel">Bitácora</span></div>
    <div class="right">
      <div class="gpschip hidden" id="gpsChip"><span class="dot wait" id="gpsDot"></span><span id="gpsTxt">GPS…</span></div>
      <button class="iconbtn hidden" id="btnDrawer" title="Ver secciones">☰</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<div class="navbar hidden" id="navbar">
  <div class="inner">
    <button class="btn ghost" id="btnBack">‹</button>
    <button class="btn accent" id="btnNext">Continuar</button>
  </div>
</div>
<div id="overlays"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
